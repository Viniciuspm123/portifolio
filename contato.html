<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contato | Vinicius Marques</title>

<link rel="stylesheet" href="css/style.css">
<link rel="shortcut icon" href="img/icone.png" type="image/x-icon">

<meta name="description" content="Entre em contato com Vinicius Pereira Marques para propostas, dúvidas e oportunidades.">
</head>

<body>

<div class="background-grid"></div> <!-- Fundo Neon -->

<main class="container">

    <!-- PERFIL -->
    <header class="perfil">
        <img class="perfil__foto" src="img/Vinicius_Pereira-Marques-Foto.png" alt="Foto de Vinicius Pereira Marques.">

        <div class="perfil__texto">
            <h1 class="glow-title">Vinicius Pereira Marques</h1>
            <p class="glow-subtitle">Desenvolvedor Full Stack</p>
        </div>
    </header>

    <!-- FORMULÁRIO -->
    <section class="contact-form-section">
        <h2 class="form-title">Entre em Contato</h2>
        <p class="contact-intro">Dúvidas, sugestões, propostas  ou oportunidades? Fale comigo!</p>

        <form action="https://formsubmit.co/vinic123pm@gmail.com" method="POST">
            <input type="text" name="nome" placeholder="Seu nome" required>
            <input type="email" name="email" placeholder="Seu e-mail" required>
            <textarea name="mensagem" placeholder="Sua mensagem" required></textarea>

            <!-- Configurações extras -->
            <input type="hidden" name="_next" value="https://viniciuspm123.github.io/portifolio/obrigado.html">
            <input type="hidden" name="_captcha" value="false">

            <button type="submit">Enviar</button>
        </form>
    </section>

    <!-- RODAPÉ -->
    <footer class="rodape">
        <p>&copy; 2025 — Desenvolvido por <span class="neon-autor">Vinicius Pereira Marques</span></p>
    </footer>

</main>

</body>
</html>
